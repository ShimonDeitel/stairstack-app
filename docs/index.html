<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Stairstack</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#140F26; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2.4rem; margin-bottom:0.4rem; color:#5B4E9E; }
  p.tag { font-size:1.15rem; color:#B79CED; margin-bottom:2rem; }
  .feature { background:rgba(255,255,255,0.05); border-radius:14px; padding:16px; margin:10px 0; }
  a.footer { color:#B79CED; text-decoration:none; font-size:0.9rem; }
  footer { margin-top:2.5rem; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #5B4E9E55 0%, #5B4E9E00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Stairstack</h1>
    <p class="tag">Stack your flights, one climb at a time.</p>
    <div class="feature">Free: Location logging with a running history — no account, no ads.</div>
    <div class="feature">Pro: Weekly/monthly totals and building-specific logs</div>
    <footer>
      <a class="footer" href="privacy.html">Privacy Policy</a> &nbsp;·&nbsp;
      <a class="footer" href="terms.html">Terms</a> &nbsp;·&nbsp;
      <a class="footer" href="mailto:s0533495227@gmail.com">Contact</a>
    </footer>
  </div>
</body>
</html>
